  # ============================================================
  # EGYPT REGION — Java-backend focused searches
  # ============================================================

  # --- LinkedIn guest searches (no login, polite jittered pagination) ---
  # Broader 30-day window + more keyword variants for higher recall.
  - slug: linkedin-egypt-java
    name: LinkedIn · Java in Egypt
    source: linkedin
    external_id: linkedin-egypt-java
    target_region: EGYPT
    careers_url: https://www.linkedin.com/jobs/
    config: {keywords: java, location: Egypt, time_posted: r2592000, max_pages: 6, fetch_details: true}

  - slug: linkedin-egypt-java-developer
